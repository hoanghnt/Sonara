services:
  postgres:
    image: postgres:15-alpine
    container_name: sonara-postgres
    environment:
      POSTGRES_DB: sonara
      POSTGRES_USER: sonara
      POSTGRES_PASSWORD: '@sonara123@'
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sonara-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sonara.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sonara-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=sonara;Username=sonara;Password=@sonara123@"
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    volumes:
      - sonara_uploads:/app/upload

  frontend:
    build:
      context: ./frontend/sonara-ui
      dockerfile: Dockerfile
    container_name: sonara-frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
  sonara_uploads:
